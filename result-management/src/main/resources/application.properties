# ============================
# Server
# ============================
server.port=8080

# ============================
# Database (MySQL)
# ============================
spring.datasource.url=jdbc:mysql://localhost:3306/result_management_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================
# JPA / Hibernate
# ============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ============================
# JWT
# ============================
jwt.secret=ZmQ4ZDU2ZmI3ZjJjNDg4ZGI4ZTI0YjI4OTYwYzI0ZTM5ZjJkMzQ4MzY2ZGI3ZjBkYjg4YjQ4ZTk4YzVkM2Q=
jwt.expiration=86400000

# ============================
# Swagger / OpenAPI
# ============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ============================
# CORS (for React frontend)
# ============================
app.cors.allowed-origins=http://localhost:5173
